<section class="section" id="projects">
  <div class="container">
    <div class="section-header" data-aos="fade-up">
      <span class="section-label">My Work</span>
      <h2 class="section-title">Featured Projects</h2>
      <div class="section-line"></div>
    </div>

    <div class="projects-grid">
      @for (project of projects; track project.name) {
        <div
          class="project-card glass-card"
          [class.featured]="project.featured"
          data-aos="fade-up"
          [attr.data-aos-delay]="$index * 100"
        >
          <div class="project-image">
            <div class="project-placeholder">
              <i class="fas fa-code"></i>
            </div>
            <div class="project-overlay">
              <div class="project-links">
                <a [href]="project.github" target="_blank" rel="noopener" class="project-link">
                  <i class="fab fa-github"></i>
                </a>
                @if (project.demo) {
                  <a [href]="project.demo" target="_blank" rel="noopener" class="project-link">
                    <i class="fas fa-external-link-alt"></i>
                  </a>
                }
              </div>
            </div>
          </div>

          <div class="project-content">
            <div class="project-meta">
              @if (project.featured) {
                <span class="featured-badge">Featured</span>
              }
              <span class="project-date"><i class="far fa-calendar-alt"></i> {{ project.date }}</span>
            </div>
            <h3 class="project-title">{{ project.name }}</h3>
            <p class="project-description">{{ project.description }}</p>
            <div class="project-tech">
              @for (tech of project.techStack; track tech) {
                <span class="tech-tag">{{ tech }}</span>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
