<section class="section" id="experience">
  <div class="container">
    <div class="section-header" data-aos="fade-up">
      <span class="section-label">Career</span>
      <h2 class="section-title">Experience</h2>
      <div class="section-line"></div>
    </div>

    <div class="timeline">
      @for (exp of experiences; track exp.title) {
        <div class="timeline-item" data-aos="fade-up" [attr.data-aos-delay]="$index * 150">
          <div class="timeline-marker">
            <div class="marker-icon">
              <i [class]="exp.icon"></i>
            </div>
            <div class="marker-line"></div>
          </div>

          <div class="timeline-content glass-card">
            <div class="timeline-header">
              <div>
                <h3>{{ exp.title }}</h3>
                <span class="company">{{ exp.company }}</span>
              </div>
              <span class="duration">
                <i class="far fa-calendar-alt"></i> {{ exp.duration }}
              </span>
            </div>
            <ul class="timeline-details">
              @for (item of exp.description; track item) {
                <li>{{ item }}</li>
              }
            </ul>
          </div>
        </div>
      }
    </div>
  </div>
</section>
